-->    <rect x="1345" y="245" width="150" height="245" rx="22" fill="#FFFFFF" stroke="#FED7AA" stroke-width="3"/>    <text x="1420" y="300" text-anchor="middle" font-size="33" font-weight="800" fill="#0F172A" font-family="Arial">      AI-Path    </text>    <text x="1420" y="329" text-anchor="middle" font-size="19" fill="#475569" font-family="Arial">      recurrence risk    </text>    <rect x="1370" y="350" width="100" height="14" rx="7" fill="url(#riskGrad)"/>    <circle cx="1445" cy="357" r="11" fill="#FFFFFF" stroke="#DC2626" stroke-width="4"/>    <!-- Mini survival plot -->    <line x1="1372" y1="448" x2="1470" y2="448" stroke="#94A3B8" stroke-width="3"/>    <line x1="1372" y1="448" x2="1372" y2="386" stroke="#94A3B8" stroke-width="3"/>    <!-- Low risk curve -->    <path d="M1374 397 L1395 398 L1395 400 L1418 401 L1418 403 L1442 405 L1442 407 L1466 410"          fill="none" stroke="#0F766E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>    <!-- High risk curve -->    <path d="M1374 399 L1395 405 L1395 414 L1418 420 L1418 431 L1442 438 L1442 445 L1466 448"          fill="none" stroke="#DC2626" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>    <text x="1382" y="382" font-size="13" fill="#0F766E" font-family="Arial">low risk</text>    <text x="1410" y="468" font-size="13" fill="#DC2626" font-family="Arial">high risk</text>  </g>  <!-- Bottom summary boxes -->  <g filter="url(#shadow)">    <rect x="80" y="640" width="520" height="170" rx="24" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>    <text x="120" y="692" font-size="30" font-weight="700" fill="#1D4ED8" font-family="Arial">      Training focus    </text>    <text x="120" y="735" font-size="23" fill="#0F172A" font-family="Arial">      Train AI-Path in CALGB 9344 using    </text>    <text x="120" y="766" font-size="23" fill="#0F172A" font-family="Arial">      digitized H&amp;E WSI and distant    </text>    <text x="120" y="797" font-size="23" fill="#0F172A" font-family="Arial">      recurrence outcomes.    </text>    <rect x="650" y="640" width="870" height="170" rx="24" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="2"/>    <text x="690" y="692" font-size="30" font-weight="700" fill="#0F766E" font-family="Arial">      Validation context included in the manuscript    </text>    <text x="690" y="735" font-size="23" fill="#0F172A" font-family="Arial">      Locked AI-Path predictions were evaluated in independent cohorts:    </text>    <text x="690" y="766" font-size="23" fill="#0F172A" font-family="Arial">      TAILORx, the multi-site Chicago cohort, and MDX-BRCA.    </text>    <text x="690" y="797" font-size="21" fill="#475569" font-family="Arial">      This repository focuses on AI pathology recurrence model training code.    </text>  </g></svg>
