<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">  <defs>    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">      <path d="M2,2 L10,6 L2,10 Z" fill="#CBD5E1"/>    </marker>    <linearGradient id="riskGrad" x1="0%" y1="0%" x2="100%" y2="0%">      <stop offset="0%" stop-color="#0F766E"/>      <stop offset="55%" stop-color="#EA580C"/>      <stop offset="100%" stop-color="#DC2626"/>    </linearGradient>    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.12"/>    </filter>  </defs>  <rect width="100%" height="100%" fill="#F8FAFC"/>  <text x="80" y="72" font-size="42" font-weight="700" fill="#0F172A" font-family="Arial, Helvetica, sans-serif">    AI-Path recurrence model training repository  </text>  <text x="80" y="116" font-size="24" fill="#475569" font-family="Arial, Helvetica, sans-serif">    Whole-slide image AI pathology biomarker training for breast cancer recurrence risk  </text>  <g filter="url(#shadow)">    <rect x="80" y="170" width="1440" height="430" rx="28" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>    <!-- Pathology slide / WSI -->    <rect x="120" y="245" width="205" height="245" rx="22" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="3"/>    <rect x="168" y="272" width="112" height="76" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="4"/>    <rect x="176" y="281" width="96" height="58" rx="5" fill="#FCE7F3" stroke="#E879F9" stroke-width="2"/>    <path d="M185 315             C179 297, 194 288, 209 297             C222 278, 253 291, 247 315             C266 327, 249 343, 230 336             C215 350, 187 340, 185 315 Z"          fill="#EC4899" opacity="0.55"/>    <path d="M205 311             C210 299, 228 300, 235 312             C243 327, 225 336, 214 328             C204 324, 201 318, 205 311 Z"          fill="#7C3AED" opacity="0.35"/>    <circle cx="196" cy=